<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تحقق من استحقاق العرض الخاص | stc</title>
<meta name="description" content="أداة تحقق من استحقاق بوكسيات الألياف البصرية (ODB) للعرض الخاص بسعر 172 ريال من stc">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="wrap">
    <div class="card">

      <div class="card__header">
        <img src="assets/logo.jpg" alt="stc">
        <span class="eyebrow">SPECIAL OFFER · SAR 172</span>
        <h1>تحقق من استحقاق العرض الخاص</h1>
        <p>ادخل رقم البوكس وتأكد فوراً إذا كان مستحقاً لعرض stc الخاص بسعر 172 ريال</p>
      </div>

      <div class="card__body">

        <div class="fiber-rail" id="fiberRail">
          <div class="fiber-rail__track">
            <span class="fiber-rail__pulse"></span>
            <span class="fiber-rail__node" id="fiberNode"></span>
          </div>
        </div>

        <div class="input-row">
          <input
            type="text"
            id="boxInput"
            placeholder="مثال: RYDHEAU1145"
            autocomplete="off"
            autocapitalize="characters"
            spellcheck="false"
          >
          <button id="checkBtn" type="button">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2.2"/>
              <path d="M20 20L16.5 16.5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
            </svg>
            <span>بحث</span>
          </button>
        </div>

        <div class="result" id="result">
          <div class="result__inner">
            <div class="result__icon" id="resultIcon"></div>
            <div class="result__title" id="resultTitle"></div>
            <div class="result__code" id="resultCode"></div>
          </div>
        </div>

        <div class="suggestions" id="suggestions">
          <div class="suggestions__heading" id="suggestionsHeading"></div>
          <div class="suggestions__list" id="suggestionsList"></div>
        </div>

        <div class="meta-row">
          <span>إجمالي البوكسيات المستحقة للعرض:</span>
          <strong id="totalCount">0</strong>
          <span class="dot-sep"></span>
          <span>تحديث القاعدة: تلقائي عند رفع <code style="direction:ltr">data.js</code></span>
        </div>

      </div>
    </div>

    <div class="footer">stc © جميع الحقوق محفوظة</div>
  </div>

<script src="data.js"></script>
<script src="script.js"></script>
</body>
</html>
